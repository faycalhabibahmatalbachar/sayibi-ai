name: sayibi_flutter
description: SAYIBI AI - Assistant IA multilingue
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0
  json_annotation: ^4.8.1

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Firebase (flutter_ai_toolkit 0.9.x → firebase_ai → firebase_core ^3.13+)
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  firebase_analytics: ^11.6.0

  # UI Material 3
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # AI Toolkit Flutter
  flutter_ai_toolkit: ^0.9.2

  # Chat UI
  flutter_chat_ui: ^1.6.12
  flutter_markdown: ^0.6.19+1
  markdown: ^7.2.1
  animated_text_kit: ^4.2.2

  # Voice
  record: ^6.2.0
  audioplayers: ^5.2.1
  just_audio: ^0.9.36

  # Files
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  open_file: ^3.3.2
  path_provider: ^2.1.2
  mime: ^2.0.0

  # Images & Media
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  photo_view: ^0.15.0

  # Animations
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  avatar_glow: ^3.0.1
  shimmer: ^3.0.0

  # Charts (pour analytics IA)
  fl_chart: ^0.66.2

  path: ^1.9.0
  http_parser: ^4.0.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^10.0.0
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^8.0.0
  device_info_plus: ^9.1.2

  # Icons
  cupertino_icons: ^1.0.6
  telephony: ^0.2.0
  flutter_contacts: ^1.1.9+2
  photo_manager: ^3.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  retrofit_generator: ^8.1.0
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
